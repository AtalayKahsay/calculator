<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> 10 Udated Calculater</title>
  <link rel="icon" href="../../puppy-page/images/logo-html-png.png">

  <style>
    body {
      background-color: #000;
      color: #fff;
      font-family: Arial;
    }

    .show-calculation {
      background-color: #000;
      color: #fff;
      font-size: 2rem;
    }

    button {
      background-color: rgb(45, 45, 45);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      font-size: 1rem;
      margin-right: 5px;
      cursor: pointer;
    }

    .orange {
      background-color: orange;
    }
  </style>

</head>

<body>
  <p>Calculator</p>

  <p class="js-show-calculation show-calculation"></p>

  <p>
    <button onclick="updateCalculation('1')">1</button>
    <button onclick="updateCalculation('2')">2</button>
    <button onclick="updateCalculation('3')">3</button>
    <button class="orange" onclick="updateCalculation(' + ')">+</button>
  </p>

  <p>
    <button onclick="updateCalculation('4')">4</button>
    <button onclick="updateCalculation('5')">5</button>
    <button onclick="updateCalculation('6')">6</button>
    <button class="orange" onclick="updateCalculation(' - ')">-</button>
  </p>

  <p>
    <button onclick="updateCalculation('7')">7</button>
    <button onclick="updateCalculation('8')">8</button>
    <button onclick="updateCalculation('9')">9</button>
    <button class="orange" onclick="updateCalculation(' * ')">*</button>
  </p>

  <p>
    <button onclick="updateCalculation('0')">0</button>
    <button onclick="updateCalculation('.')">.</button>
    <button onclick="evaluation()">=</button>
    <button class="orange-button" onclick="updateCalculation(' / ')">/</button>
  </p>

  <p>
    <button onclick="deleteLast()">Del</button>
    <button onclick="clearAll()">Clear</button>
  </p>
  <br>

  <p><a href="05-final-calculator-project.html">Click here</a> to see the final version of the project.</p>

  <script>
   let calculation = localStorage.getItem('calculation') || '';
   displayCalculation();

   function updateCalculation(value) {
    calculation += value;
    displayCalculation();
    localStorage.setItem('calculation', calculation);
   }

   function evaluation() {
    calculation = eval(calculation);
    displayCalculation();
    localStorage.setItem('calculation', calculation);
   }

   function clearAll() {
    calculation = '';
    displayCalculation();
    localStorage.setItem('calculation', calculation);
   }

   function displayCalculation() {
    document.querySelector('.js-show-calculation')
      .innerHTML = calculation;
   }

   function deleteLast() {
  calculation = calculation.slice(0, -1);
  displayCalculation();
  localStorage.setItem('calculation', calculation);
}
  </script>
</body>
</html>
